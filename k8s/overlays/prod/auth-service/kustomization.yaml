apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
- ../../../base/auth-service

configMapGenerator:
- files:
  - ./configmaps/auth-service-configmap.yaml
  name: prod-config

images:
- name: docker.io/adrianomoretti/auth-service
  newTag: latest

generatorOptions:
  disableNameSuffixHash: true
