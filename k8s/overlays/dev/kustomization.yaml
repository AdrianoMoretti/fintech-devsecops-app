apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: dev-
namespace: dev

images:
  - name: docker.io/adrianomoretti/fintech-devsecops-app
    newTag: "dev"

configMapGenerator:
  - name: dev-config
    files:
      - ../../base/configmaps.yaml

secretGenerator:
  - name: dev-secrets
    literals:
      - DOCKER_USER=adrianomoretti
      - DOCKER_PASS=********
    type: kubernetes.io/basic-auth
