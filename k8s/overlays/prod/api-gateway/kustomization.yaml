apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/api-gateway


configMapGenerator:
- name: api-gateway-config
  literals:
    - APP_NAME=api-gateway
    - APP_ENV=prod
    - LOG_LEVEL=info
  options:
    disableNameSuffixHash: true

images:
- name: docker.io/adrianomoretti/api-gateway
  newTag: latest
