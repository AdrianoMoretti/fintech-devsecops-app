apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/auth-service

configMapGenerator:
- name: auth-service-config
  literals:
    - APP_NAME=auth-service
    - APP_ENV=staging
    - LOG_LEVEL=info
  options:
    disableNameSuffixHash: true

images:
- name: docker.io/adrianomoretti/auth-service
  newTag: latest
