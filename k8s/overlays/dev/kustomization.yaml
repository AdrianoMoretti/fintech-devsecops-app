apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
- ../../base

configMapGenerator:
- files:
  - ./configmaps/account-service-configmap.yaml
  - ./configmaps/api-gateway-configmap.yaml
  - ./configmaps/auth-service-configmap.yaml
  - ./configmaps/payment-service-configmap.yaml
  - ./configmaps/user-service-configmap.yaml
  name: dev-config

images:
- name: docker.io/adrianomoretti/fintech-devsecops-app
  newTag: latest

generatorOptions:
  disableNameSuffixHash: true
