apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../base/auth-service

patchesStrategicMerge:
- auth-service--resources-patch.yaml

configMapGenerator:
- name: auth-service-config
  files:
  - ./configmaps/auth-service-configmap.yaml

images:
- name: docker.io/adrianomoretti/auth-service
  newTag: latest
