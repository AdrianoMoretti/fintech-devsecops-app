apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: staging-
namespace: staging

images:
  - name: docker.io/adrianomoretti/fintech-devsecops-app
    newTag: "staging"

configMapGenerator:
  - name: staging-config
    files:
      - ../../base/configmaps.yaml

secretGenerator:
  - name: staging-secrets
    literals:
      - DOCKER_USER=adrianomoretti
      - DOCKER_PASS=********
    type: kubernetes.io/basic-auth
