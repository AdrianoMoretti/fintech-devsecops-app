apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
- ../../../base/payment-service

configMapGenerator:
- files:
  - ./configmaps/payment-service-configmap.yaml
  name: dev-config

images:
- name: docker.io/adrianomoretti/payment-service
  newTag: latest

generatorOptions:
  disableNameSuffixHash: true
